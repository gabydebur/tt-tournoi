apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tt-tournoi.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tt-tournoi.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.backend.env.SECRET_KEY | b64enc | quote }}
  DATABASE_URL: {{ include "tt-tournoi.databaseUrl" . | b64enc | quote }}
  REDIS_URL: {{ include "tt-tournoi.redisUrl" . | b64enc | quote }}
