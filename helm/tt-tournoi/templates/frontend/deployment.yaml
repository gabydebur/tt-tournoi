apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tt-tournoi.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tt-tournoi.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "tt-tournoi.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tt-tournoi.frontend.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: false  # nginx requires root to bind port 80 unless reconfigured
        fsGroup: 101         # nginx group
      containers:
        - name: frontend
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
