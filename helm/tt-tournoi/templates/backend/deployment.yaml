apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tt-tournoi.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tt-tournoi.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tt-tournoi.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tt-tournoi.backend.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the configmap or secret changes
        checksum/config: {{ include (print $.Template.BasePath "/backend/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- if .Values.global.imageRegistry }}
      imagePullSecrets: []
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: "{{ if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{ end }}{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Sensitive values from Secret
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tt-tournoi.fullname" . }}
                  key: SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "tt-tournoi.fullname" . }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "tt-tournoi.fullname" . }}
                  key: REDIS_URL
          envFrom:
            # Non-sensitive config from ConfigMap
            - configMapRef:
                name: {{ include "tt-tournoi.fullname" . }}-backend
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
